
<div (mouseenter)="hover()" (mouseleave)="leave()" [ngClass]="{'item-hover':isHovered}" class="d-flex item " *ngFor="let item of items">
    <div class="col-md-3">
        <span class="">{{item.duration}}</span>
    </div>
    <div class="d-flex flex-wrap col-md-9">
        <h5 class="">{{item.job_title}}</h5>
        <p class="">{{item.description}}</p>
        <div class="d-flex w-100">
            <div class="rounded-pill border px-1 tech" *ngFor="let item of item.job_requirements_technologies">{{item}}</div>
        </div>
    </div>
</div>

<a class="d-flex resumeLink" href="https://drive.google.com/file/d/1KnheiyvZV2r_TJ3OglU2eSDVUN0rb2rP/view" target="_blank"> <p class="">View Full Resume</p>    <i class="fa-solid fa-arrow-right-long"></i></a>
