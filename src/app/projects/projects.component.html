
<a *ngFor="let item of items" [href]="item.Link" target="_blank" class="text-decoration-none">

    <div (mouseenter)="hover()" (mouseleave)="leave()" [ngClass]="{'item-hover':isHovered}" class="d-flex item " >

        <div class="col-md-3 p-3">
            <img class="w-100"  [src]="item.imgSrc" >
        </div>
    
        <div class="d-flex flex-wrap col-md-9 p-1">
            <h5 class="">{{item.project_title}} </h5><span class=""> developed at {{item.developed_at}}</span>
            <p class="">{{item.description}}</p>
            <div class="d-flex flex-wrap p-1">
                <div class="rounded-pill border px-1 py-0 tech" *ngFor="let item of item.project_technologies">{{item}}
                </div>
    
            </div>
        </div>
    </div>
</a>
